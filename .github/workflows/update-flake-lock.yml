name: update-flake-lock
on:
  workflow_dispatch: # allows manual triggering
  schedule: # run the job at 05:00am (UTC) (+10 AEST - 15:00 - 3pm) every 7 days
    - cron: "0 5 */7 * *"
jobs:
  lockfile:
    runs-on: [ubuntu-latest]
    permissions:
      contents: write
      pull-requests: write
      checks: read
    outputs:
      rev: ${{ steps.new_hash.outputs.NEW_HEAD }}
      pull-request-number: ${{ steps.update.outputs.pull-request-number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Update flake.lock
        uses: DeterminateSystems/update-flake-lock@main
        id: update
        with:
          commit-msg: "flake (lock): bump flake lock"
          pr-title: "flake (lock): bump flake lock"
          pr-labels: |
            dependencies
            automated
      - name: Get bumped commit hash
        id: new_hash
        run: |
          git fetch
          git switch update_flake_lock_action
          echo "NEW_HEAD=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  build:
    needs: lockfile
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
      pull-requests: write
      checks: read
    steps:
      - name: Checkout Pending PR
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.lockfile.outputs.rev }}
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - uses: cachix/cachix-action@v17
        with:
          name: timenglart
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Build package
        run: |
          nix build .#
  merge:
    runs-on: [ubuntu-latest]
    needs: [build, lockfile]
    permissions:
      contents: write
      pull-requests: write
      checks: read
    steps:
      - name: Merge Sucessful PR Build
        run: |
          if [ -n "${{ needs.lockfile.outputs.pull-request-number }}" ]; then
            gh pr merge --auto --rebase ${{ needs.lockfile.outputs.pull-request-number }}
          fi
        env:
          GH_TOKEN: ${{ github.token }}
